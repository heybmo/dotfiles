# Unbind Ctrl-b as prefix and set it to Ctrl-space
# Make sure to uncheck MacOS keyboard shortcut for input source first!
# https://github.com/tmux/tmux/issues/457#issuecomment-357938515
set-option -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim style pane selection
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable extended keys so tmux passes through modified sequences
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Send distinct escape sequence for shift+enter (for Claude Code)
bind -n S-Enter send-keys Escape "[13;2u"

# Disable automatic renaming of windows
set -g automatic-rename off
set -g allow-rename off
set -g set-titles off

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift+Alt+[H|L] will cycle between previous / next window
bind -n C-H previous-window
bind -n C-L next-window

# Eliminate escape time delay (critical for (Neo)vim)
set -sg escape-time 0

# Fix terminal colors - set to 24bit
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Enable focus events for proper editor integration
set -g focus-events on

# Increase scrollback buffer (100k for LLM output)
set -g history-limit 100000

# Vi copy mode with macOS clipboard integration
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in cwd
bind c new-window -c "#{pane_current_path}"

# Floating popup terminal (prefix + p)
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Reload config file shortcut (prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Config Reloaded!"

# ---------------------------------------------------
# === Plugins ===


# Make sure to git clone tpm into ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Move left/right/up/down between windows
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'


# === Themes / Styling ===

set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor 'mocha'

# Status bar styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_date_time} #{E:@catppuccin_status_host}"
set -g @catppuccin_date_time_text " %b %d %H:%M"


# Load all plugins
run ~/.tmux/plugins/tpm/tpm
